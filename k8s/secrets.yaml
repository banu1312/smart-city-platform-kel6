apiVersion: v1
kind: Secret
metadata:
  name: trashtrack-secrets
  namespace: trashtrack
type: Opaque
stringData:
  # JWT Secret — harus sama di semua service
  JWT_SECRET: "supersecretkeyjwtpilihanyangpanjangdanaman"
 
  # Database credentials
  DB_PASSWORD: "rootpass"
  DB_USERNAME: "root"
  MYSQL_ROOT_PASSWORD: "rootpass"
 
  # RabbitMQ credentials
  RABBITMQ_USER: "guest"
  RABBITMQ_PASS: "guest"
 
  # OAuth secrets (opsional untuk future use)
  OAUTH_CLIENT_SECRET: "oauth-client-secret-kelompok6"
 
# ---
# CATATAN KEAMANAN:
# Di production, ganti semua nilai di atas dengan password yang kuat.
# Bisa gunakan: kubectl create secret generic trashtrack-secrets \
#   --from-literal=JWT_SECRET='...' \
#   --from-literal=DB_PASSWORD='...' \
#   -n trashtrack
# Atau gunakan Sealed Secrets / Vault untuk secret management yang lebih aman