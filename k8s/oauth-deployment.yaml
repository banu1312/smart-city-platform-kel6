apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth
  namespace: trashtrack
  labels:
    app: oauth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth
  template:
    metadata:
      labels:
        app: oauth
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until nc -z mysql-service 3306; do
                sleep 5
              done
              echo "MySQL ready!"
      containers:
        - name: oauth
          image: smart-city-platform-kel6-oauth-server:latest
          imagePullPolicy: IfNotPresent
          # Ganti image di atas dengan image oauth kalian yang sudah di-push
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: JWT_EXPIRES_IN
            - name: JWT_REFRESH_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: JWT_REFRESH_EXPIRES_IN
            - name: OAUTH_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: OAUTH_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
 
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-service
  namespace: trashtrack
  labels:
    app: oauth
spec:
  type: ClusterIP
  selector:
    app: oauth
  ports:
    - port: 3002
      targetPort: 3002
      name: http