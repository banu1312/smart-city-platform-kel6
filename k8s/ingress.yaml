apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trashtrack-ingress
  namespace: trashtrack
  annotations:
    # Untuk nginx ingress controller
    spec.ingressClassName: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    # SSL dengan cert-manager (aktifkan kalau sudah install cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  # TLS (aktifkan setelah setup cert-manager)
  # tls:
  #   - hosts:
  #       - trashtrack.yourdomain.com
  #     secretName: trashtrack-tls
  rules:
    # Ganti host di bawah dengan domain/IP server kalian
    # Kalau pakai IP langsung (VPS): bisa pakai nip.io
    # contoh: 103.147.92.134.nip.io
    - host: trashtrack.103.147.92.134.nip.io
      http:
        paths:
          # Semua request masuk ke gateway (single entry point)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 3000
 
    # Opsional: akses langsung ke backend (untuk debug)
    # - host: api.trashtrack.103.147.92.134.nip.io
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: backend-service
    #             port:
    #               number: 8000