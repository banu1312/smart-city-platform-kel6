apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: trashtrack
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: smart-city-platform-kel6-express-gateway:latest
          imagePullPolicy: IfNotPresent
          # Ganti image di atas dengan image gateway kalian yang sudah di-push
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: JWT_EXPIRES_IN
            - name: GATEWAY_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: GATEWAY_PORT
            - name: OAUTH_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: OAUTH_SERVER_URL
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: BACKEND_URL
            - name: PYTHON_ML_URL
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: PYTHON_ML_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
 
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: trashtrack
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
      name: http