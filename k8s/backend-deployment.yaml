apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-storage-pvc
  namespace: trashtrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: trashtrack
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Init container: tunggu MySQL siap, lalu migrate
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until nc -z mysql-service 3306; do
                echo "MySQL not ready, sleeping 5s..."
                sleep 5
              done
              echo "MySQL is ready!"
        - name: run-migrations
          image: smart-city-platform-kel6-backend:latest
          imagePullPolicy: IfNotPresent 
          # Ganti image di atas dengan image backend kalian yang sudah di-push
          command:
            - sh
            - -c
            - |
              php artisan migrate --force
              echo "Migration done!"
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: APP_KEY
            - name: DB_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_PASSWORD
 
      containers:
        - name: backend
          image: smart-city-platform-kel6-backend:latest
          imagePullPolicy: IfNotPresent 
          # Ganti image di atas dengan image backend kalian yang sudah di-push
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: APP_DEBUG
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: APP_URL
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: APP_KEY
            - name: DB_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: trashtrack-secrets
                  key: RABBITMQ_PASS
            - name: ML_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: ML_SERVICE_URL
            - name: CACHE_STORE
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: CACHE_STORE
            - name: SESSION_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: SESSION_DRIVER
            - name: FILESYSTEM_DISK
              valueFrom:
                configMapKeyRef:
                  name: trashtrack-config
                  key: FILESYSTEM_DISK
          volumeMounts:
            - name: backend-storage
              mountPath: /app/storage/app/public
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/smart-bin/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/smart-bin/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: backend-storage
          persistentVolumeClaim:
            claimName: backend-storage-pvc
 
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: trashtrack
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http