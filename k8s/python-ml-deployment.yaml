apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml
  namespace: trashtrack
  labels:
    app: python-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml
  template:
    metadata:
      labels:
        app: python-ml
    spec:
      containers:
        - name: python-ml
          image: smart-city-platform-kel6-python-ml:latest
          imagePullPolicy: IfNotPresent
          # Ganti image di atas dengan image ML kalian yang sudah di-push
          ports:
            - containerPort: 5000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
 
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: trashtrack
  labels:
    app: python-ml
spec:
  type: ClusterIP
  selector:
    app: python-ml
  ports:
    - port: 5000
      targetPort: 5000
      name: http