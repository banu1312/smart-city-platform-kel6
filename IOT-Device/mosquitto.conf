# =============================================================
# iot/mosquitto.conf
# TrashTrack - Smart Waste & Eco-Sanitation Management
# Sprint 1 - IoT & Messaging Engineer
#
# Konfigurasi Mosquitto MQTT Broker dengan otentikasi ketat
# (username/password) sesuai aturan keamanan proyek.
# =============================================================

# --- Network ---
listener 1883
protocol mqtt

# --- Autentikasi ---
# Otentikasi wajib (anonymous connection DITOLAK)
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Persistence ---
# Pesan & state broker disimpan agar tidak hilang saat restart
persistence true
persistence_location ./data/

# --- Logging ---
log_dest stdout
log_dest file ./log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# --- Limits (opsional, bisa disesuaikan nanti) ---
max_keepalive 60