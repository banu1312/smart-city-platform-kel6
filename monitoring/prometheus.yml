global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: trashtrack

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['express-gateway:3000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
    scrape_interval: 30s
