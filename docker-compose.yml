services:

  mysql:
    image: mysql:8.0
    container_name: trashtrack-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-smartcity}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: trashtrack-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - ./monitoring/rabbitmq-enabled-plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: trashtrack-mosquitto
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /mosquitto/data /mosquitto/log
        mosquitto_passwd -c -b /mosquitto/config/passwd admin $$MQTT_ADMIN_PASSWORD
        mosquitto_passwd -b /mosquitto/config/passwd iot_device $$MQTT_IOT_PASSWORD
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    environment:
      MQTT_ADMIN_PASSWORD: ${MQTT_ADMIN_PASSWORD}
      MQTT_IOT_PASSWORD: ${MQTT_IOT_PASSWORD}
    ports:
      - "1883:1883"
    volumes:
      - ./IOT-Device/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  oauth-server:
    build: ./oauth-server
    container_name: trashtrack-oauth
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OAUTH_PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: trashtrack-backend
    environment:
      APP_NAME: TrashTrackBackend
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://backend:8000
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-smartcity}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      ML_SERVICE_URL: http://python-ml:5000
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  python-ml:
    build: ./python-ml-service
    container_name: trashtrack-ml
    ports:
      - "5000:5000"

  express-gateway:
    build: ./express-gateway
    container_name: trashtrack-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      GATEWAY_PORT: "3000"
      OAUTH_SERVER_URL: http://oauth-server:3002
      BACKEND_URL: http://backend:8000
      PYTHON_ML_URL: http://python-ml:5000
    ports:
      - "3000:3000"
    depends_on:
      - oauth-server
      - backend
      - python-ml

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: trashtrack-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - express-gateway
      - rabbitmq

  grafana:
    image: grafana/grafana:10.0.0
    container_name: trashtrack-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/trashtrack.json
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  backend-storage:
  mosquitto-data:
  prometheus-data:
  grafana-data:
